schema_version: 1

context:
  name: llama-index-llms-openai
  version: "0.7.7"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/llama_index_llms_openai-${{ version }}.tar.gz
    sha256: ae9d6fa5ff1982e218d404c328b883a276c12374e1b12d81101ac254cbe569d1
  # https://github.com/run-llama/llama_index/issues/10806
  - url: https://raw.githubusercontent.com/run-llama/llama_index/main/LICENSE
    sha256: 24f40b5190fdacabc24ddbb5f76364d15e4f030925220ea300d8a2dd4993c8cb

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - openai >=1.108.1,<3
    - python >=${{ python_min }},<4.0
    - llama-index-core >=0.14.5,<0.15

tests:
  - python:
      imports:
        - llama_index.llms.openai
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: llama-index llms openai integration
  license: MIT
  license_file: LICENSE
  homepage: https://llamaindex.ai
  repository: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/llms/llama-index-llms-openai

extra:
  recipe-maintainers:
    - jan-janssen
    - pavelzw
